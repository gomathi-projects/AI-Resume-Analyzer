<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(120deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.container{
    background:white;
    padding:40px;
    border-radius:10px;
    width:450px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:10px;
}

p{
    color:#666;
    font-size:14px;
}

.upload-box{
    border:2px dashed #aaa;
    padding:30px;
    margin:20px 0;
    border-radius:8px;
    cursor:pointer;
}

.upload-box:hover{
    border-color:#4facfe;
}

input[type=file]{
    margin-top:10px;
}

button{
    background:#4facfe;
    color:white;
    border:none;
    padding:12px 25px;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#007bff;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}

</style>
</head>

<body>

<div class="container">

<h1>Resume Analyzer</h1>

<p>Upload your resume and discover the best job roles based on your skills.</p>

<form method="POST" enctype="multipart/form-data">

<div class="upload-box">

📄 Upload Resume

<br><br>

<input type="file" name="resume" required>

</div>

<button type="submit">Analyze Resume</button>

</form>

<div class="footer">
Supported formats: PDF, DOCX, TXT
</div>

</div>

</body>
</html>
